services:
  gi-tracker:
    build: .
    environment:
      - ADMIN_ACCESS_TOKEN=${ADMIN_ACCESS_TOKEN}
      - UPLOAD_DIR=/app/public/media
      - INGEST_TOKEN=${INGEST_TOKEN}
      - BEHIND_PROXY=1
      - ASTRO_DATABASE_FILE=/app/data/gi-tracker.db
    volumes:
      - media:/app/public/media
      - data:/app/data
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - media:/app/public/media:ro
    depends_on:
      gi-tracker:
        condition: service_healthy
    restart: unless-stopped

volumes:
  media:
  data:
